name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: |
          dotnet publish src/Funcy.Console/Funcy.Console.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=false

      - name: Pack
        shell: bash
        run: |
          APP_NAME=az-funcy
          RUNTIME=${{ matrix.rid }}
          VERSION=${GITHUB_REF#refs/tags/v}
          PUBLISH_DIR=src/Funcy.Console/bin/Release/net9.0/$RUNTIME/publish

          mkdir -p artifacts
          cd $PUBLISH_DIR
          zip -r "$GITHUB_WORKSPACE/artifacts/${APP_NAME}-${VERSION}-${RUNTIME}.zip" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.rid }}
          path: artifacts/*.zip
          if-no-files-found: error

  nuget-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Pack
        run: |
          dotnet pack src/Funcy.Console/Funcy.Console.csproj \
            -c Release \
            --output nupkg \
            /p:MinVerTagPrefix=v

      - name: Push to NuGet
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
